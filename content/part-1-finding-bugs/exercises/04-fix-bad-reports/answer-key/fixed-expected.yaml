# Reference answers — one valid rewrite per bad report.
# Grader uses structural validation, not exact match.

bugs:
  - title: "[Login] Submit button enabled with empty password field allows login attempt"
    location: "login/form"
    severity: High
    priority: High
    environment:
      browser: Chrome 130
      os: macOS 14
      viewport: 1440x900
      url: "TODO: actual buggy app URL/login"
    steps:
      - action: navigate
        url: "/login"
      - action: type
        selector: '[data-test="email"]'
        value: "test@example.com"
      - action: click
        selector: '[data-test="submit"]'
    expected: "Validation error: password is required"
    actual: "Login attempt proceeds with empty password"

  - title: "[Cart] Total price not recalculated after changing item quantity"
    location: "cart/total"
    severity: High
    priority: High
    environment:
      browser: Chrome 130
      os: macOS 14
      viewport: 1440x900
      url: "TODO: actual buggy app URL/cart"
    steps:
      - action: navigate
        url: "/cart"
      - action: click
        selector: '[data-test="quantity-increase"]'
      - action: assert_text
        selector: '[data-test="cart-total"]'
        value: "updated total"
    expected: "Total updates to reflect new quantity × unit price"
    actual: "Total remains unchanged after quantity is increased"

  - title: "[Dashboard] JavaScript error thrown on initial load for authenticated users"
    location: "dashboard"
    severity: Critical
    priority: High
    environment:
      browser: Chrome 130
      os: macOS 14
      viewport: 1440x900
      url: "TODO: actual buggy app URL/dashboard"
    steps:
      - action: navigate
        url: "/login"
      - action: type
        selector: '[data-test="email"]'
        value: "user@example.com"
      - action: click
        selector: '[data-test="submit"]'
    expected: "Dashboard loads without console errors"
    actual: "Uncaught TypeError in console: Cannot read properties of undefined"

  - title: "[Registration] Email field accepts plaintext without @ symbol"
    location: "registration/email"
    severity: High
    priority: High
    environment:
      browser: Chrome 130
      os: macOS 14
      viewport: 1440x900
      url: "TODO: actual buggy app URL/register"
    steps:
      - action: navigate
        url: "/register"
      - action: type
        selector: '[data-test="email"]'
        value: "notanemail"
      - action: click
        selector: '[data-test="submit"]'
    expected: "Inline error: Please enter a valid email address"
    actual: "Form submits without any email validation error"

  - title: "[Checkout] Mobile: Place Order button not tappable on viewport <375px"
    location: "checkout/actions"
    severity: High
    priority: High
    environment:
      browser: Safari 17
      os: iOS 17
      viewport: 375x667
      url: "TODO: actual buggy app URL/checkout"
    steps:
      - action: navigate
        url: "/checkout"
      - action: scroll
        selector: '[data-test="place-order-btn"]'
      - action: click
        selector: '[data-test="place-order-btn"]'
    expected: "Order is placed and confirmation page is shown"
    actual: "Tap has no effect — button appears outside visible area due to overflow"
