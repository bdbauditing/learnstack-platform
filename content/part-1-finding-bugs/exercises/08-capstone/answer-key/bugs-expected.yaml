# STAFF ONLY

bugs:
  - id: BUG-001
    description: "Submit disabled with valid credentials"
    location: "login"
    severity: High
    priority: High
    signatureKeywords: ["button", "disabled", "login"]
    keywordThreshold: 0.6

  - id: BUG-002
    description: "Password shown as plain text"
    location: "login"
    severity: Medium
    priority: Medium
    signatureKeywords: ["password", "plain", "visible"]
    keywordThreshold: 0.5

  - id: BUG-003
    description: "Invalid email accepted on registration"
    location: "registration"
    severity: High
    priority: High
    signatureKeywords: ["email", "invalid", "registration"]
    keywordThreshold: 0.5

  - id: BUG-004
    description: "500 error on duplicate email"
    location: "registration"
    severity: High
    priority: Medium
    signatureKeywords: ["email", "duplicate", "error"]
    keywordThreshold: 0.5

  - id: BUG-005
    description: "Cart total doesn't update"
    location: "cart"
    severity: High
    priority: High
    signatureKeywords: ["total", "cart", "quantity"]
    keywordThreshold: 0.5

  - id: BUG-006
    description: "Coupon applies 100% discount"
    location: "cart"
    severity: Critical
    priority: High
    signatureKeywords: ["coupon", "discount", "cart"]
    keywordThreshold: 0.5

  - id: BUG-007
    description: "Credit card field accepts letters"
    location: "checkout"
    severity: High
    priority: High
    signatureKeywords: ["credit", "card", "letters"]
    keywordThreshold: 0.5

  - id: BUG-008
    description: "Order confirmation email not sent"
    location: "checkout"
    severity: Medium
    priority: High
    signatureKeywords: ["email", "order", "confirmation"]
    keywordThreshold: 0.5

  - id: BUG-009
    description: "Bio doesn't save on Update"
    location: "profile"
    severity: Medium
    priority: Medium
    signatureKeywords: ["bio", "save", "profile"]
    keywordThreshold: 0.6

  - id: BUG-010
    description: "Avatar upload accepts .exe files"
    location: "profile"
    severity: High
    priority: High
    signatureKeywords: ["avatar", "upload", "file"]
    keywordThreshold: 0.5

passThreshold: 8
