# STAFF ONLY

bugs:
  - id: BUG-001
    description: "Seat count can be decremented to 0 — the decrease button has no minimum of 1"
    location: "billing/seat-count"
    severity: High
    priority: High
    signatureKeywords: ["seat", "zero", "minimum", "decrement", "quantity", "count"]
    keywordThreshold: 0.4

  - id: BUG-002
    description: "Total price does not update when seat count changes"
    location: "billing/total"
    severity: High
    priority: High
    signatureKeywords: ["total", "price", "seat", "update", "recalculate"]
    keywordThreshold: 0.4

  - id: BUG-003
    description: "Removing the selected plan deletes it immediately with no confirmation dialog"
    location: "billing/remove-plan"
    severity: Medium
    priority: Medium
    signatureKeywords: ["remove", "plan", "confirm", "dialog", "immediately"]
    keywordThreshold: 0.4

  - id: BUG-004
    description: "Promo code SAVE10 applies a 100% discount instead of 10%"
    location: "billing/promo-code"
    severity: Critical
    priority: High
    signatureKeywords: ["promo", "discount", "percent", "coupon", "code", "100"]
    keywordThreshold: 0.4

  - id: BUG-005
    description: "Proceed to checkout button remains visible when no plan is selected"
    location: "billing/empty-state"
    severity: Low
    priority: Medium
    signatureKeywords: ["checkout", "button", "empty", "plan", "visible", "selection"]
    keywordThreshold: 0.4

  - id: BUG-006
    description: "Plan price displayed without decimal point — $1000 shown instead of $10.00"
    location: "billing/price-display"
    severity: High
    priority: High
    signatureKeywords: ["price", "decimal", "display", "billing", "dollar", "format"]
    keywordThreshold: 0.4

passThreshold: 5
