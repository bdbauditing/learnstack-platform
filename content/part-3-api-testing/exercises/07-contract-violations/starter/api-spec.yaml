# TaskForge API — OpenAPI 3.0 Spec (simplified)
# This is the CONTRACT the API should follow. Find where it doesn't.

openapi: "3.0.0"
info:
  title: TaskForge API
  version: "1.0"

paths:
  /tasks:
    get:
      summary: List all tasks
      responses:
        "200":
          description: Array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - priority
        - completed
        - created_at
      properties:
        id:
          type: integer
        title:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
        completed:
          type: boolean
        created_at:
          type: string
          format: date-time

    TaskInput:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
