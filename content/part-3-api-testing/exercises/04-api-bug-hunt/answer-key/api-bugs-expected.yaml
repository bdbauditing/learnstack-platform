# STAFF ONLY

bugs:
  - id: BUG-001
    description: "POST /tasks returns 200 instead of 201 on task creation"
    location: "POST /tasks"
    severity: Medium
    priority: Medium
    signatureKeywords:
      - "post"
      - "tasks"
      - "201"
    keywordThreshold: 0.6

  - id: BUG-002
    description: "GET /tasks/:id response missing created_at field"
    location: "GET /tasks"
    severity: Medium
    priority: Medium
    signatureKeywords:
      - "created_at"
      - "missing"
      - "field"
    keywordThreshold: 0.5

  - id: BUG-003
    description: "PATCH /tasks/:id accepts empty string title"
    location: "PATCH /tasks"
    severity: Medium
    priority: High
    signatureKeywords:
      - "patch"
      - "empty"
      - "title"
    keywordThreshold: 0.5

  - id: BUG-004
    description: "DELETE /tasks/:id returns 200 for non-existent task"
    location: "DELETE /tasks"
    severity: Medium
    priority: Medium
    signatureKeywords:
      - "delete"
      - "404"
      - "non-existent"
    keywordThreshold: 0.5

passThreshold: 3
