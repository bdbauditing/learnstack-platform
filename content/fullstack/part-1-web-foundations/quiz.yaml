quiz:
  questions:
    - id: q1
      text: "Which HTTP status code indicates that a new resource was successfully created?"
      options:
        - id: a
          text: "200 OK"
        - id: b
          text: "201 Created"
        - id: c
          text: "204 No Content"
        - id: d
          text: "301 Moved Permanently"
      correct: b
      explanation: "201 Created is the correct status for a successful POST that creates a resource. 200 OK is for successful reads, 204 is for successful operations with no response body (like DELETE), and 301 is a redirect."

    - id: q2
      text: "Which HTTP method is considered both safe AND idempotent?"
      options:
        - id: a
          text: "POST"
        - id: b
          text: "DELETE"
        - id: c
          text: "GET"
        - id: d
          text: "PATCH"
      correct: c
      explanation: "GET is safe (it does not change server state) and idempotent (calling it many times returns the same result). POST is neither. DELETE is idempotent but not safe. PATCH is neither."

    - id: q3
      text: "In REST design, which URL pattern correctly retrieves a single article with id 42?"
      options:
        - id: a
          text: "GET /getArticle?id=42"
        - id: b
          text: "GET /articles/delete/42"
        - id: c
          text: "POST /articles/42"
        - id: d
          text: "GET /articles/42"
      correct: d
      explanation: "REST uses nouns in URLs and HTTP methods as verbs. GET /articles/42 follows the convention: the method (GET) expresses the intent, and the URL (articles/42) identifies the resource. Verbs in URLs like /getArticle break the uniform interface constraint."

    - id: q4
      text: "What does a JavaScript Promise in the 'rejected' state mean?"
      options:
        - id: a
          text: "The async operation is still running"
        - id: b
          text: "The async operation completed successfully"
        - id: c
          text: "The async operation failed with an error"
        - id: d
          text: "The Promise was cancelled by the user"
      correct: c
      explanation: "A Promise has three states: pending (still running), fulfilled/resolved (completed successfully), and rejected (failed with an error). Rejected promises trigger .catch() handlers or the catch block of a try/catch around an await."

    - id: q5
      text: "When debugging in browser DevTools, which tab shows all HTTP requests made by the page along with their status codes?"
      options:
        - id: a
          text: "Console"
        - id: b
          text: "Elements"
        - id: c
          text: "Network"
        - id: d
          text: "Sources"
      correct: c
      explanation: "The Network tab records every HTTP request and response, showing the URL, method, status code, size, and timing. Console shows log output, Elements shows the DOM tree, and Sources shows JS/CSS source files."
