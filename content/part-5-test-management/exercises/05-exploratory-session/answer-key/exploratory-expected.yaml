# STAFF ONLY — used by bug-match grader
# Subset of planted-bugs.yaml (Ex04) most discoverable via exploratory testing.
bugs:
  - id: BUG-003
    description: "Due date accepts dates in the past with no warning — user can save a task overdue before it is created"
    location: "task-form / due-date input"
    severity: Medium
    priority: High
    signatureKeywords: ["due", "date", "past", "warning", "validation"]
    keywordThreshold: 0.4

  - id: BUG-005
    description: "File attachment accepts disallowed extensions (.exe, .bat) — the type filter is not enforced server-side"
    location: "task-form / file attachment"
    severity: High
    priority: High
    signatureKeywords: ["attachment", "file", "extension", "exe", "bat", "type"]
    keywordThreshold: 0.4

  - id: BUG-008
    description: "Task tags field silently adds duplicate tags — adding the same tag twice results in two identical tag badges"
    location: "task-form / tags input"
    severity: Low
    priority: Medium
    signatureKeywords: ["tag", "duplicate", "silent", "unique", "tags"]
    keywordThreshold: 0.4

  - id: BUG-009
    description: "Completing a task does not update the dashboard completed-count — the counter stays at the old value"
    location: "dashboard / task counters"
    severity: Medium
    priority: High
    signatureKeywords: ["complete", "count", "dashboard", "update", "counter"]
    keywordThreshold: 0.4

  - id: BUG-011
    description: "Moving a task between projects removes all its tags — tags are wiped when the project selector is changed"
    location: "task-detail / project selector"
    severity: High
    priority: High
    signatureKeywords: ["move", "project", "tags", "lost", "removed"]
    keywordThreshold: 0.4

  - id: BUG-012
    description: "Bulk status update to done leaves tasks visible in the active filter — filter does not re-apply after bulk update"
    location: "task-list / bulk operations"
    severity: Medium
    priority: High
    signatureKeywords: ["bulk", "status", "done", "active", "filter", "visible"]
    keywordThreshold: 0.4

  - id: BUG-014
    description: "Reopening a completed task resets its due date to null — the due date is cleared when the task is reopened"
    location: "task-detail / reopen action"
    severity: Medium
    priority: High
    signatureKeywords: ["reopen", "due", "date", "null", "reset", "complete"]
    keywordThreshold: 0.4

  - id: BUG-015
    description: "Deleting a task does not remove it from shared views immediately — other users still see the deleted task until they refresh"
    location: "shared-view / task display"
    severity: Medium
    priority: Medium
    signatureKeywords: ["delete", "shared", "view", "immediate", "refresh", "visible"]
    keywordThreshold: 0.4

  - id: BUG-024
    description: "Create task button has no accessible name — no aria-label and no visible text; screen readers cannot identify it"
    location: "task-list / create button"
    severity: High
    priority: High
    signatureKeywords: ["button", "accessible", "name", "aria-label", "create", "screen-reader"]
    keywordThreshold: 0.4

  - id: BUG-025
    description: "Task status uses colour only with no text label — colour-blind users cannot distinguish status"
    location: "task-list / status indicator"
    severity: Medium
    priority: High
    signatureKeywords: ["status", "color", "colour", "text", "label", "accessible"]
    keywordThreshold: 0.4

  - id: BUG-026
    description: "Modal dialogs do not trap focus — pressing Tab inside a modal moves focus outside the modal to the page behind"
    location: "task-detail / modal"
    severity: High
    priority: High
    signatureKeywords: ["modal", "focus", "trap", "tab", "escape", "keyboard"]
    keywordThreshold: 0.4

  - id: BUG-028
    description: "IDOR — a user can read another user's private task by incrementing the task ID in the URL"
    location: "GET /tasks/:id ownership check"
    severity: Critical
    priority: High
    signatureKeywords: ["idor", "private", "user", "task", "id", "access", "other"]
    keywordThreshold: 0.4

passThreshold: 12
