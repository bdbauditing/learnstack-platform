quiz:
  title: "Part 5 Knowledge Check — Test Management and Release"
  pass_threshold: 0.7
  questions:
    - id: Q01
      type: single_choice
      question: "Which of the following belongs in the 'Scope' section of a test plan?"
      options:
        - text: "The pass rate threshold that must be met before sign-off"
          correct: false
        - text: "A list of which features will and will not be tested in this release"
          correct: true
        - text: "The names of the testers assigned to the project"
          correct: false
        - text: "The bug severity classification matrix"
          correct: false
      explanation: "Scope defines the boundaries of what is being tested. It lists features explicitly included and explicitly excluded. Pass rate belongs in Exit Criteria, tester names belong in a RACI or resource section, and severity classification is part of the defect management process — not scope."

    - id: Q02
      type: single_choice
      question: "TestRail's CSV import format requires which of the following columns at minimum?"
      options:
        - text: "ID, Title, Steps, Expected Result"
          correct: true
        - text: "Title, Assignee, Due Date, Status"
          correct: false
        - text: "Bug ID, Severity, Reproduces, Fix Version"
          correct: false
        - text: "Suite, Section, Tester, Browser"
          correct: false
      explanation: "TestRail's CSV import expects at minimum: a title, the steps to execute, and the expected result. An ID column is also included to uniquely identify each case. Assignee and due date are project management fields, not test case fields. Bug fields belong in a defect tracker, not a test case CSV."

    - id: Q03
      type: single_choice
      question: "A defect has been fixed by a developer and deployed to staging. What is the correct next state?"
      options:
        - text: "Closed — the developer confirmed the fix works"
          correct: false
        - text: "Verified — a tester must confirm the fix works before closing"
          correct: true
        - text: "Reopened — all fixed defects must be reopened to confirm the fix"
          correct: false
        - text: "Won't Fix — the defect was addressed and no further action is needed"
          correct: false
      explanation: "After a developer marks a bug as Fixed, the correct next step is Verified — a tester (not the developer) confirms that the fix works in the test environment. Only after successful verification can the bug move to Closed. Never let the developer verify their own fix."

    - id: Q04
      type: single_choice
      question: "An exploratory testing charter reads: 'Explore the file attachment feature to discover data validation and error handling issues.' What is the TIME BOX for this session most likely to be?"
      options:
        - text: "8 hours — exploratory testing has no fixed duration"
          correct: false
        - text: "30–90 minutes — exploratory sessions are deliberately time-boxed"
          correct: true
        - text: "5 minutes — charters are for very quick checks only"
          correct: false
        - text: "Exactly 24 hours — one session per business day"
          correct: false
      explanation: "Exploratory sessions are time-boxed, typically 30–90 minutes. The time box creates focus and prevents sessions from expanding indefinitely. When the timer runs out, the tester writes up notes regardless of whether they feel 'done.' Sessions shorter than 30 minutes rarely produce deep findings; sessions longer than 90 minutes lead to fatigue and shallow coverage."

    - id: Q05
      type: single_choice
      question: "Exit criteria for a release state: 'Pass rate must be at or above 95%.' The test run shows 47 passed, 3 failed, 0 blocked out of 50 executed. Have the exit criteria been met?"
      options:
        - text: "Yes — 47 out of 50 is 94%, which is close enough to 95%"
          correct: false
        - text: "No — 47 out of 50 is 94%, which does not meet the 95% threshold"
          correct: true
        - text: "Yes — blocked cases are excluded so the rate is 100%"
          correct: false
        - text: "No — exit criteria can never be met when any test has failed"
          correct: false
      explanation: "Pass rate = (passed / executed) × 100 = (47 / 50) × 100 = 94%. The threshold is 95%, so exit criteria are NOT met. Close is not the same as meeting the criteria. The team must decide whether to fix the 3 failures or formally accept the risk and override the exit criteria with documented justification."

    - id: Q06
      type: single_choice
      question: "Which formula correctly calculates test pass rate?"
      options:
        - text: "(total test cases / passed cases) × 100"
          correct: false
        - text: "(passed / (passed + failed + blocked)) × 100"
          correct: false
        - text: "(passed / executed) × 100, where executed = passed + failed"
          correct: true
        - text: "(failed / total planned) × 100"
          correct: false
      explanation: "Pass rate = (passed / executed) × 100. Executed means cases that actually ran — passed plus failed. Blocked cases are excluded because you could not run them. Option B incorrectly includes blocked in the denominator, which unfairly lowers the pass rate for cases that were never executed."

    - id: Q07
      type: single_choice
      question: "A test case status is marked 'Blocked.' What does this mean?"
      options:
        - text: "The test case failed and a defect was filed"
          correct: false
        - text: "The test case cannot be executed because a prerequisite or dependency is broken"
          correct: true
        - text: "The test case was deliberately skipped by the tester"
          correct: false
        - text: "The test case is waiting for a developer to review it before running"
          correct: false
      explanation: "Blocked means the tester is unable to execute the test case because something else is broken first. For example, if login is completely broken, any test case that requires being logged in is blocked. Blocked is not a result — it is an obstacle. The case is revisited once the blocker is resolved."

    - id: Q08
      type: single_choice
      question: "What is the difference between a smoke test and a regression test?"
      options:
        - text: "Smoke tests are automated; regression tests are always manual"
          correct: false
        - text: "A smoke test is a quick sanity check of critical functionality; a regression test verifies that existing functionality still works after a change"
          correct: true
        - text: "Smoke tests cover every feature in depth; regression tests cover only new features"
          correct: false
        - text: "There is no difference — the terms are interchangeable"
          correct: false
      explanation: "A smoke test is a brief, broad check: does the app start, can users log in, do the main pages load? It is run immediately after a new build is deployed to decide whether deeper testing is worth starting. A regression test is a comprehensive check of existing functionality to make sure a recent change did not break something that was working before."

    - id: Q09
      type: single_choice
      question: "A QA sign-off document recommends GO with the condition: 'BUG-007 must be verified fixed before deployment.' What does this mean for the release manager?"
      options:
        - text: "The release can proceed immediately — GO means no conditions apply"
          correct: false
        - text: "The release is blocked until BUG-007 is fully resolved with no exceptions"
          correct: false
        - text: "The release can proceed only after a tester confirms BUG-007's fix works — it is a release gate condition"
          correct: true
        - text: "The release should be cancelled because a bug still exists"
          correct: false
      explanation: "A conditional GO means QA is comfortable with the release subject to specific conditions being met. The release manager cannot deploy until BUG-007 is verified fixed by a tester. Release conditions are gate checks — the deployment is on hold until each condition is satisfied and documented."

    - id: Q10
      type: single_choice
      question: "A known defect crashes the app when a user uploads a file over 50MB. Analytics show fewer than 0.2% of users ever upload files that large. The release date is tomorrow. What is the most appropriate risk-based decision?"
      options:
        - text: "Automatic NO-GO — any crash bug must be fixed before release"
          correct: false
        - text: "Delay the release until the bug is fixed regardless of impact"
          correct: false
        - text: "Document the defect, assess the low likelihood and workaround availability, and recommend a conditional GO with a hotfix scheduled within one sprint"
          correct: true
        - text: "Close the bug as Won't Fix without telling the release manager"
          correct: false
      explanation: "Risk-based decisions weigh severity against likelihood and business impact. A crash that affects 0.2% of users on a specific edge case is a different risk than a crash affecting all users on login. The right approach is to document the bug clearly, note the low likelihood, confirm a workaround exists (upload files under 50MB), and recommend a conditional GO with a scheduled hotfix. Hiding the bug is never acceptable."
