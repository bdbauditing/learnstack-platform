# STAFF ONLY — used by bug-match grader
bugs:
  - id: GAP-001
    description: "US-001 (login) has no acceptance criteria — no security requirements, no session timeout, no MFA mention"
    location: "US-001 / login"
    severity: High
    priority: High
    signatureKeywords: ["us-001", "login", "acceptance", "criteria", "security", "session", "mfa"]
    keywordThreshold: 0.4

  - id: GAP-002
    description: "US-002 uses unmeasurable word 'fast' for task loading — no SLO, no millisecond threshold defined"
    location: "US-002 / task loading"
    severity: High
    priority: High
    signatureKeywords: ["us-002", "fast", "measurable", "slo", "threshold", "millisecond", "performance"]
    keywordThreshold: 0.4

  - id: GAP-003
    description: "US-003 'team productivity' is undefined — no definition of what metrics constitute productivity"
    location: "US-003 / productivity"
    severity: High
    priority: High
    signatureKeywords: ["us-003", "productivity", "undefined", "metric", "definition", "measure"]
    keywordThreshold: 0.4

  - id: GAP-004
    description: "US-004 'required fields' are not listed — no specification of which fields are mandatory for task creation"
    location: "US-004 / required fields"
    severity: High
    priority: High
    signatureKeywords: ["us-004", "required", "fields", "mandatory", "list", "specification"]
    keywordThreshold: 0.4

  - id: GAP-005
    description: "File attachment story has no file size limit, no allowed file types, and no error handling for rejected files"
    location: "US-005 / file attachments"
    severity: Medium
    priority: High
    signatureKeywords: ["attachment", "file", "size", "limit", "type", "extension", "error"]
    keywordThreshold: 0.4

  - id: GAP-006
    description: "Email notification story specifies no delivery SLA, retry policy, or what happens when delivery fails"
    location: "US-006 / email notifications"
    severity: Medium
    priority: Medium
    signatureKeywords: ["notification", "email", "delivery", "sla", "retry", "fail", "guarantee"]
    keywordThreshold: 0.4

  - id: GAP-007
    description: "Search story does not specify which fields are searched (title only? description? tags?), no fuzzy match specification"
    location: "US-007 / task search"
    severity: Medium
    priority: High
    signatureKeywords: ["search", "fields", "title", "description", "fuzzy", "match", "scope"]
    keywordThreshold: 0.4

  - id: GAP-008
    description: "Bulk operations story has no undo/rollback specification and no confirmation prompt requirement"
    location: "US-008 / bulk operations"
    severity: High
    priority: High
    signatureKeywords: ["bulk", "undo", "rollback", "confirmation", "prompt", "operation", "delete"]
    keywordThreshold: 0.4

  - id: GAP-009
    description: "Role-based access story does not define what roles exist, their permissions, or how roles are assigned"
    location: "US-009 / role-based access"
    severity: High
    priority: High
    signatureKeywords: ["role", "permission", "access", "define", "assign", "admin", "member"]
    keywordThreshold: 0.4

  - id: GAP-010
    description: "API key management story has no key expiration policy, rotation requirement, or revocation specification"
    location: "US-010 / api key management"
    severity: High
    priority: High
    signatureKeywords: ["api", "key", "expiration", "rotation", "revocation", "policy", "expire"]
    keywordThreshold: 0.4

passThreshold: 7
