# STAFF ONLY — used by test-catches-bug grader

bugs:

  # ── UI Validation (8 bugs) ─────────────────────────────────────────────────

  - id: BUG-001
    description: "Task title accepts empty string — form submits with no title and creates a blank task"
    location: "task-form / title input"
    severity: High
    priority: High
    signatureKeywords: ["title", "empty", "blank", "required", "validation"]
    keywordThreshold: 0.4

  - id: BUG-002
    description: "Task title accepts over 200 characters — no character limit enforced on the title field"
    location: "task-form / title input"
    severity: High
    priority: High
    signatureKeywords: ["title", "max", "length", "200", "character", "limit"]
    keywordThreshold: 0.4

  - id: BUG-003
    description: "Due date accepts dates in the past with no warning — user can save a task overdue before it is created"
    location: "task-form / due-date input"
    severity: Medium
    priority: High
    signatureKeywords: ["due", "date", "past", "warning", "validation"]
    keywordThreshold: 0.4

  - id: BUG-004
    description: "Priority dropdown includes deprecated 'archived' option — selecting it saves an invalid priority value"
    location: "task-form / priority dropdown"
    severity: Medium
    priority: Medium
    signatureKeywords: ["priority", "archived", "dropdown", "invalid", "option"]
    keywordThreshold: 0.4

  - id: BUG-005
    description: "File attachment accepts disallowed extensions (.exe, .bat) — the type filter is not enforced server-side"
    location: "task-form / file attachment"
    severity: High
    priority: High
    signatureKeywords: ["attachment", "file", "extension", "exe", "bat", "type"]
    keywordThreshold: 0.4

  - id: BUG-006
    description: "Task title display does not escape HTML — injecting a <script> tag in the title executes JavaScript"
    location: "task-list / task title display"
    severity: Critical
    priority: High
    signatureKeywords: ["xss", "script", "escape", "html", "title", "inject"]
    keywordThreshold: 0.4

  - id: BUG-007
    description: "Search field accepts SQL injection payload without sanitisation — raw SQL fragments are passed to the query"
    location: "search / search input"
    severity: Critical
    priority: High
    signatureKeywords: ["search", "sql", "injection", "sanitize", "payload", "query"]
    keywordThreshold: 0.4

  - id: BUG-008
    description: "Task tags field silently adds duplicate tags — adding the same tag twice results in two identical tag badges"
    location: "task-form / tags input"
    severity: Low
    priority: Medium
    signatureKeywords: ["tag", "duplicate", "silent", "unique", "tags"]
    keywordThreshold: 0.4

  # ── Workflow Bugs (7 bugs) ─────────────────────────────────────────────────

  - id: BUG-009
    description: "Completing a task does not update the dashboard completed-count — the counter stays at the old value"
    location: "dashboard / task counters"
    severity: Medium
    priority: High
    signatureKeywords: ["complete", "count", "dashboard", "update", "counter"]
    keywordThreshold: 0.4

  - id: BUG-010
    description: "Assigning a task to yourself triggers no notification — self-assignment silently skips the email"
    location: "notifications / task assignment"
    severity: Low
    priority: Medium
    signatureKeywords: ["assign", "self", "notification", "email", "yourself"]
    keywordThreshold: 0.4

  - id: BUG-011
    description: "Moving a task between projects removes all its tags — tags are wiped when the project selector is changed"
    location: "task-detail / project selector"
    severity: High
    priority: High
    signatureKeywords: ["move", "project", "tags", "lost", "removed"]
    keywordThreshold: 0.4

  - id: BUG-012
    description: "Bulk status update to done leaves tasks visible in the active filter — filter does not re-apply after bulk update"
    location: "task-list / bulk operations"
    severity: Medium
    priority: High
    signatureKeywords: ["bulk", "status", "done", "active", "filter", "visible"]
    keywordThreshold: 0.4

  - id: BUG-013
    description: "Task created via API does not appear in the UI without a page refresh — real-time sync is broken for API-created tasks"
    location: "task-list / real-time updates"
    severity: Medium
    priority: Medium
    signatureKeywords: ["api", "ui", "refresh", "appear", "real-time", "sync"]
    keywordThreshold: 0.4

  - id: BUG-014
    description: "Reopening a completed task resets its due date to null — the due date is cleared when the task is reopened"
    location: "task-detail / reopen action"
    severity: Medium
    priority: High
    signatureKeywords: ["reopen", "due", "date", "null", "reset", "complete"]
    keywordThreshold: 0.4

  - id: BUG-015
    description: "Deleting a task does not remove it from shared views immediately — other users still see the deleted task until they refresh"
    location: "shared-view / task display"
    severity: Medium
    priority: Medium
    signatureKeywords: ["delete", "shared", "view", "immediate", "refresh", "visible"]
    keywordThreshold: 0.4

  # ── API-Layer Bugs (8 bugs) ────────────────────────────────────────────────

  - id: BUG-016
    description: "POST /tasks returns 200 instead of 201 on successful task creation — wrong HTTP status code"
    location: "POST /tasks response"
    severity: Low
    priority: Medium
    signatureKeywords: ["post", "tasks", "201", "200", "status", "create"]
    keywordThreshold: 0.4

  - id: BUG-017
    description: "GET /tasks/:id returns 200 for a non-existent task ID — should return 404"
    location: "GET /tasks/:id response"
    severity: High
    priority: High
    signatureKeywords: ["get", "tasks", "404", "nonexistent", "missing", "id"]
    keywordThreshold: 0.4

  - id: BUG-018
    description: "PATCH /tasks/:id accepts an empty string as task title — server-side validation not enforced on update"
    location: "PATCH /tasks/:id body"
    severity: High
    priority: High
    signatureKeywords: ["patch", "tasks", "empty", "title", "validation", "string"]
    keywordThreshold: 0.4

  - id: BUG-019
    description: "DELETE /tasks/:id returns 200 for an already-deleted task — should return 404 for idempotency"
    location: "DELETE /tasks/:id response"
    severity: Low
    priority: Medium
    signatureKeywords: ["delete", "tasks", "404", "already", "deleted", "idempotent"]
    keywordThreshold: 0.4

  - id: BUG-020
    description: "GET /tasks?status=completed filter returns all tasks regardless of status — query param is ignored"
    location: "GET /tasks filter"
    severity: High
    priority: High
    signatureKeywords: ["get", "tasks", "filter", "status", "completed", "query"]
    keywordThreshold: 0.4

  - id: BUG-021
    description: "POST /auth/login returns 200 with invalid credentials — should return 401"
    location: "POST /auth/login response"
    severity: Critical
    priority: High
    signatureKeywords: ["login", "auth", "invalid", "401", "credentials", "password"]
    keywordThreshold: 0.4

  - id: BUG-022
    description: "Token refresh does not invalidate the old access token — old token continues to work after refresh"
    location: "POST /auth/refresh"
    severity: High
    priority: High
    signatureKeywords: ["token", "refresh", "old", "invalidate", "expire", "reuse"]
    keywordThreshold: 0.4

  - id: BUG-023
    description: "Task API responses include the full user object with password hash — sensitive data leaked in response body"
    location: "GET /tasks response body"
    severity: Critical
    priority: High
    signatureKeywords: ["password", "hash", "user", "response", "leak", "sensitive"]
    keywordThreshold: 0.4

  # ── Accessibility Issues (4 bugs) ─────────────────────────────────────────

  - id: BUG-024
    description: "Create task button has no accessible name — no aria-label and no visible text; screen readers cannot identify it"
    location: "task-list / create button"
    severity: High
    priority: High
    signatureKeywords: ["button", "accessible", "name", "aria-label", "create", "screen-reader"]
    keywordThreshold: 0.4

  - id: BUG-025
    description: "Task status uses colour only with no text label — colour-blind users cannot distinguish status"
    location: "task-list / status indicator"
    severity: Medium
    priority: High
    signatureKeywords: ["status", "color", "colour", "text", "label", "accessible"]
    keywordThreshold: 0.4

  - id: BUG-026
    description: "Modal dialogs do not trap focus — pressing Tab inside a modal moves focus outside the modal to the page behind"
    location: "task-detail / modal"
    severity: High
    priority: High
    signatureKeywords: ["modal", "focus", "trap", "tab", "escape", "keyboard"]
    keywordThreshold: 0.4

  - id: BUG-027
    description: "Form validation error messages are not announced to screen readers — error messages lack aria-live or role=alert"
    location: "task-form / error messages"
    severity: High
    priority: High
    signatureKeywords: ["error", "validation", "aria", "announce", "screen-reader", "live"]
    keywordThreshold: 0.4

  # ── Security Edge Cases (3 bugs) ──────────────────────────────────────────

  - id: BUG-028
    description: "IDOR — a user can read another user's private task by incrementing the task ID in the URL"
    location: "GET /tasks/:id ownership check"
    severity: Critical
    priority: High
    signatureKeywords: ["idor", "private", "user", "task", "id", "access", "other"]
    keywordThreshold: 0.4

  - id: BUG-029
    description: "Session is not invalidated on logout — the old token continues to work after the user logs out"
    location: "POST /auth/logout"
    severity: Critical
    priority: High
    signatureKeywords: ["logout", "session", "token", "invalidate", "expire", "reuse"]
    keywordThreshold: 0.4

  - id: BUG-030
    description: "Password reset link works multiple times — it is not single-use and does not expire after first click"
    location: "password reset flow"
    severity: High
    priority: High
    signatureKeywords: ["password", "reset", "link", "single-use", "expire", "reuse"]
