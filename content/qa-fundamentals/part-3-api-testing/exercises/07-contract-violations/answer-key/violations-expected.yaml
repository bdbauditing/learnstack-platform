# STAFF ONLY

bugs:
  - id: VIO-001
    description: "priority field returns integer instead of string"
    location: "GET /tasks"
    severity: High
    priority: High
    signatureKeywords:
      - "priority"
      - "integer"
      - "string"
    keywordThreshold: 0.6

  - id: VIO-002
    description: "created_at field missing from POST /tasks response"
    location: "POST /tasks"
    severity: High
    priority: High
    signatureKeywords:
      - "created_at"
      - "missing"
      - "post"
    keywordThreshold: 0.5

  - id: VIO-003
    description: "completed field returns string instead of boolean"
    location: "GET /tasks"
    severity: Medium
    priority: Medium
    signatureKeywords:
      - "completed"
      - "boolean"
      - "string"
    keywordThreshold: 0.6

passThreshold: 3
