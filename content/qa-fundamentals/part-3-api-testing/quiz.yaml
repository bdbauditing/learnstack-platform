quiz:
  title: "Part 3 Knowledge Check — API Testing"
  pass_threshold: 0.7
  questions:
    - id: Q1
      type: single_choice
      question: "An API endpoint returns HTTP 200 with this body: {\"users\": []}. What should your test assert?"
      options:
        - text: "Status code is 200 — the test passes"
          correct: false
        - text: "Status code is 200 AND the users array is non-empty (or contains expected data)"
          correct: true
        - text: "The Content-Type header is application/json"
          correct: false
        - text: "The response time is under 200ms"
          correct: false
      explanation: "200 OK is not always okay. An empty array might mean the endpoint returned successfully but the data is wrong. Always assert the body, not just the status code."

    - id: Q2
      type: single_choice
      question: "Which HTTP method should you use to partially update a user's email address without replacing their entire profile?"
      options:
        - text: "PUT"
          correct: false
        - text: "POST"
          correct: false
        - text: "PATCH"
          correct: true
        - text: "GET"
          correct: false
      explanation: "PATCH is for partial updates — only the fields you send are changed. PUT replaces the entire resource, meaning you would need to send all fields including the ones you don't want to change."

    - id: Q3
      type: single_choice
      question: "You send a POST request with a malformed JSON body (missing closing brace). What status code should the server return?"
      options:
        - text: "200 OK"
          correct: false
        - text: "500 Internal Server Error"
          correct: false
        - text: "400 Bad Request or 422 Unprocessable Entity"
          correct: true
        - text: "404 Not Found"
          correct: false
      explanation: "Malformed input is a client error — the server should return 4xx. A 500 in response to bad input is itself a bug (the server should handle it gracefully). 400 = bad syntax; 422 = valid syntax but semantically invalid."

    - id: Q4
      type: single_choice
      question: "In Postman, you want the Authorization header on all requests to use a token captured from the login endpoint. What is the correct approach?"
      options:
        - text: "Hardcode the token value in every request header"
          correct: false
        - text: "Use a Collection Variable set by a test script on the login request, referenced as {{auth_token}} in subsequent headers"
          correct: true
        - text: "Copy-paste the token manually into each request before running"
          correct: false
        - text: "Send the token as a query parameter"
          correct: false
      explanation: "Auth chaining: the login endpoint's Tests tab sets pm.collectionVariables.set('auth_token', response.json().token). Subsequent requests use Authorization: Bearer {{auth_token}}. Hardcoding tokens is insecure and breaks when tokens expire."

    - id: Q5
      type: single_choice
      question: "What is the difference between a 401 and a 403 response?"
      options:
        - text: "401 means not found; 403 means server error"
          correct: false
        - text: "401 means unauthenticated (no valid credentials); 403 means unauthorized (authenticated but no permission)"
          correct: true
        - text: "They mean the same thing — both indicate access denied"
          correct: false
        - text: "401 is for APIs; 403 is for web pages"
          correct: false
      explanation: "401 Unauthorized = you haven't proved who you are (no token or bad token). 403 Forbidden = we know who you are, but you don't have permission to do this. They are distinct and both should be tested separately."

    - id: Q6
      type: single_choice
      question: "Which of the following is a correct negative test for a 'create user' endpoint?"
      options:
        - text: "Send valid data and assert 201 Created"
          correct: false
        - text: "Send a request without the required 'email' field and assert 400 Bad Request with an error body"
          correct: true
        - text: "Send valid data twice and assert the second response is also 201"
          correct: false
        - text: "Send a GET request instead of POST and assert 200"
          correct: false
      explanation: "Negative testing asks: what happens when input is wrong? Omitting a required field should produce a 400 (not a 500, not a 201). The assertion should check both the status code and that the error body mentions the missing field."

    - id: Q7
      type: single_choice
      question: "An API spec says the 'price' field is type number, but the live API returns price as a string (\"19.99\" instead of 19.99). This is an example of:"
      options:
        - text: "A performance bug"
          correct: false
        - text: "A contract violation"
          correct: true
        - text: "A 4xx error"
          correct: false
        - text: "Expected behaviour — both represent the same value"
          correct: false
      explanation: "Contract testing verifies that the API matches its spec. A string instead of a number is a contract violation — it will break any client that expects a number type, even though the value looks the same to humans."

    - id: Q8
      type: single_choice
      question: "You run a Newman collection with 10 requests. One pm.test() assertion fails on request 7. What is Newman's exit code?"
      options:
        - text: "0 (success)"
          correct: false
        - text: "1 (failure)"
          correct: true
        - text: "7 (the index of the failing request)"
          correct: false
        - text: "10 (total number of requests)"
          correct: false
      explanation: "Newman exits with code 1 if ANY test assertion fails, regardless of which request or how many pass. This is what makes it usable in CI — a single failing assertion fails the build."

    - id: Q9
      type: single_choice
      question: "What is the purpose of environment variables in Postman?"
      options:
        - text: "To store the entire request body so it doesn't need to be retyped"
          correct: false
        - text: "To parameterise values (base URL, tokens, IDs) that change between environments or runs"
          correct: true
        - text: "To define which HTTP method each request uses"
          correct: false
        - text: "To set the response format (JSON vs XML)"
          correct: false
      explanation: "Environment variables let you switch between dev/staging/prod by changing one variable ({{base_url}}) instead of editing every request. They also store dynamic values like auth tokens without hardcoding secrets."

    - id: Q10
      type: single_choice
      question: "A GET /products request consistently takes 4.2 seconds in your Postman tests. The SLA says reads should complete in under 500ms. What should you do?"
      options:
        - text: "Add pm.expect(pm.response.responseTime).to.be.below(500) and treat it as a test failure"
          correct: true
        - text: "Accept it — performance testing is a separate specialist activity"
          correct: false
        - text: "Retry the request until it passes under 500ms"
          correct: false
        - text: "Change the SLA in the spec to 5000ms"
          correct: false
      explanation: "Response-time assertions in Postman are a first line of defence. pm.expect(pm.response.responseTime).to.be.below(500) flags the slow endpoint in the same collection run. This is not full load testing — it checks a single request's performance, which is appropriate for an API smoke/sanity check."
