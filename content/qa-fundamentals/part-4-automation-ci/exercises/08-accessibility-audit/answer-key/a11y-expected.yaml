# STAFF ONLY — used by bug-match grader
# 10 planted a11y violations. Pass threshold: 8.

bugs:
  - id: A11Y-001
    description: "Dashboard hero image img.hero-banner is missing an alt attribute. Screen readers skip it entirely. axe rule: image-alt."
    location: "dashboard / img.hero-banner"
    severity: Serious
    priority: High
    signatureKeywords:
      - "image-alt"
      - "alt"
      - "img"
      - "hero"
      - "banner"
      - "dashboard"
    keywordThreshold: 0.4

  - id: A11Y-002
    description: "Secondary button text has a colour contrast ratio of 2.1:1 against its background, below the WCAG AA minimum of 4.5:1. axe rule: color-contrast."
    location: "dashboard / button.btn-secondary"
    severity: Serious
    priority: Medium
    signatureKeywords:
      - "color-contrast"
      - "contrast"
      - "button"
      - "secondary"
      - "wcag"
      - "ratio"
    keywordThreshold: 0.4

  - id: A11Y-003
    description: "Task title input field input#task-title has no associated label element. Form inputs must have visible labels or aria-label. axe rule: label."
    location: "task-form / input#task-title"
    severity: Critical
    priority: High
    signatureKeywords:
      - "label"
      - "input"
      - "task-title"
      - "form"
      - "aria-label"
    keywordThreshold: 0.4

  - id: A11Y-004
    description: "Delete button button.delete-btn has no accessible name — no text content, no aria-label, no title. Keyboard and screen reader users cannot identify its purpose. axe rule: button-name."
    location: "task-list / button.delete-btn"
    severity: Critical
    priority: High
    signatureKeywords:
      - "button-name"
      - "button"
      - "delete"
      - "accessible"
      - "name"
    keywordThreshold: 0.4

  - id: A11Y-005
    description: "Profile icon link a.profile-icon-link contains only an SVG icon with no text and no aria-label. Link has no accessible name. axe rule: link-name."
    location: "navbar / a.profile-icon-link"
    severity: Serious
    priority: High
    signatureKeywords:
      - "link-name"
      - "link"
      - "profile"
      - "icon"
      - "accessible"
    keywordThreshold: 0.4

  - id: A11Y-006
    description: "The html element is missing the lang attribute. Screen readers use this to select the correct language engine. axe rule: html-has-lang."
    location: "all pages / html element"
    severity: Serious
    priority: Medium
    signatureKeywords:
      - "html-has-lang"
      - "lang"
      - "html"
      - "language"
      - "screen reader"
    keywordThreshold: 0.4

  - id: A11Y-007
    description: "Status badge span.status-badge uses role=progressbar but has no accessible name — no aria-label, aria-labelledby, or visible text label. Progressbar elements must have an accessible name. axe rule: aria-progressbar-name."
    location: "task-list / span[role=progressbar]"
    severity: Moderate
    priority: Low
    signatureKeywords:
      - "aria-progressbar-name"
      - "progressbar"
      - "accessible"
      - "name"
      - "badge"
    keywordThreshold: 0.4

  - id: A11Y-008
    description: "The login form uses aria-describedby='login-help' but two elements share that id, making the ARIA reference ambiguous. IDs referenced in ARIA attributes must be unique. axe rule: duplicate-id-aria. NOTE: axe 4.11+ classifies this as 'incomplete' (needs human review) rather than a definitive violation — check r.incomplete in addition to r.violations."
    location: "login / form[aria-describedby]"
    severity: Minor
    priority: Low
    signatureKeywords:
      - "duplicate-id-aria"
      - "login"
      - "duplicate"
      - "aria"
      - "id"
    keywordThreshold: 0.4

  - id: A11Y-009
    description: "Sidebar heading hierarchy jumps from h2 to h4, skipping h3. Heading levels must not skip. axe rule: heading-order."
    location: "dashboard / sidebar"
    severity: Moderate
    priority: Medium
    signatureKeywords:
      - "heading-order"
      - "heading"
      - "h4"
      - "skip"
      - "sidebar"
    keywordThreshold: 0.4

  - id: A11Y-010
    description: "Help widget iframe.help-widget is missing a title attribute. Iframes must have a title so screen reader users know what is inside. axe rule: frame-title."
    location: "dashboard / iframe.help-widget"
    severity: Serious
    priority: Medium
    signatureKeywords:
      - "frame-title"
      - "iframe"
      - "title"
      - "help"
      - "widget"
    keywordThreshold: 0.4

passThreshold: 8
