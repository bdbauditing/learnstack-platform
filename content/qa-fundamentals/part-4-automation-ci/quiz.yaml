quiz:
  title: "Part 4 Knowledge Check — Automation, CI, and Non-Functional Testing"
  pass_threshold: 0.7
  questions:
    - id: Q01
      type: single_choice
      question: "In the Page Object Model, where do you put a selector like `page.getByLabel('Email')`?"
      options:
        - text: "Directly in every test that needs it"
          correct: false
        - text: "Inside the Page Object class for the login page"
          correct: true
        - text: "In a global constants file shared across all tests"
          correct: false
        - text: "In the playwright.config.ts file"
          correct: false
      explanation: "The whole point of POM is to put selectors and interactions inside a dedicated class. Tests call methods on that class — they never touch raw selectors directly. This means if the selector changes, you fix it in one place."

    - id: Q02
      type: single_choice
      question: "A GitHub Actions workflow uses `on: push: branches: [main]`. When does this workflow trigger?"
      options:
        - text: "Every time any branch receives a push"
          correct: false
        - text: "Only when a pull request is opened"
          correct: false
        - text: "Only when code is pushed to the main branch"
          correct: true
        - text: "On a schedule, once per day"
          correct: false
      explanation: "The `branches` filter under `push` restricts the trigger to pushes on the named branches only. Pushes to feature branches, PRs from forks, and other branches do not trigger this workflow."

    - id: Q03
      type: single_choice
      question: "In JMeter, what does the Thread Group setting '20 threads, 5-second ramp-up' mean?"
      options:
        - text: "20 requests are sent, then JMeter waits 5 seconds before sending more"
          correct: false
        - text: "JMeter starts 20 virtual users gradually over 5 seconds, ending at 20 concurrent users"
          correct: true
        - text: "Each of the 20 threads waits 5 seconds before sending its first request"
          correct: false
        - text: "The test runs for exactly 5 seconds regardless of thread count"
          correct: false
      explanation: "Ramp-up time is the duration over which JMeter brings all threads to full load. With 20 threads and 5-second ramp-up, JMeter starts one new virtual user every 0.25 seconds until all 20 are active."

    - id: Q04
      type: single_choice
      question: "Which of the following is the MOST common cause of flaky Playwright tests?"
      options:
        - text: "Using TypeScript instead of JavaScript"
          correct: false
        - text: "Running tests in headless mode"
          correct: false
        - text: "Race conditions — interacting with elements before they are ready"
          correct: true
        - text: "Having too many test files in one project"
          correct: false
      explanation: "Race conditions happen when the test clicks or asserts before the page has finished loading or before an element is interactive. Playwright's built-in auto-waits reduce but don't eliminate this if you bypass them with hardcoded timeouts."

    - id: Q05
      type: single_choice
      question: "According to the test pyramid, which layer should have the MOST tests?"
      options:
        - text: "E2E (end-to-end) tests"
          correct: false
        - text: "Integration tests"
          correct: false
        - text: "Unit tests"
          correct: true
        - text: "Performance tests"
          correct: false
      explanation: "The pyramid shows unit tests at the base — they are the most numerous because they are fast, cheap, and reliable. E2E tests sit at the tip — there should be relatively few of them because they are slow and expensive to maintain."

    - id: Q06
      type: single_choice
      question: "What does `@axe-core/playwright` do when you call `new AxeBuilder({ page }).analyze()`?"
      options:
        - text: "It takes a screenshot and sends it to a remote accessibility service"
          correct: false
        - text: "It runs automated WCAG-based accessibility rules against the current page and returns any violations"
          correct: true
        - text: "It replaces the browser with a screen reader simulation"
          correct: false
        - text: "It validates that all ARIA attributes are syntactically correct HTML"
          correct: false
      explanation: "axe-core injects a script into the page, runs its rule engine against the DOM, and returns structured results including violations grouped by impact level (critical, serious, moderate, minor)."

    - id: Q07
      type: single_choice
      question: "You need to automate a large legacy enterprise app in Java that must support Internet Explorer 11. Which tool is the better fit?"
      options:
        - text: "Playwright, because it has faster auto-waits"
          correct: false
        - text: "Selenium, because it supports legacy browsers and has a mature Java API"
          correct: true
        - text: "Playwright, because it has better parallelisation"
          correct: false
        - text: "Selenium, because it is newer and has better documentation"
          correct: false
      explanation: "Playwright does not support Internet Explorer. Selenium has supported IE for many years and has a mature Java client library. For legacy browser requirements, Selenium is the correct choice."

    - id: Q08
      type: single_choice
      question: "In a GitHub Actions workflow YAML file, what is the purpose of the `on:` key?"
      options:
        - text: "It defines the operating system the job runs on"
          correct: false
        - text: "It lists the steps to execute in order"
          correct: false
        - text: "It specifies which events trigger the workflow"
          correct: true
        - text: "It sets environment variables for all jobs"
          correct: false
      explanation: "`on:` is the trigger definition. It tells GitHub Actions which events (push, pull_request, schedule, workflow_dispatch, etc.) should cause the workflow to run. Without it, the workflow never runs automatically."

    - id: Q09
      type: single_choice
      question: "What is a smoke test?"
      options:
        - text: "A test that checks every possible code path in the application"
          correct: false
        - text: "A quick, broad test that checks whether the most critical features are working at all"
          correct: true
        - text: "A performance test that measures response times under load"
          correct: false
        - text: "A test that runs only in a production environment"
          correct: false
      explanation: "A smoke test is a minimal sanity check. The name comes from electronics — you power up a new circuit and check that it doesn't literally smoke. In software, it means: does the app start, can users log in, do the main pages load? It does not cover edge cases."

    - id: Q10
      type: single_choice
      question: "Which of the following best describes 'shift-left testing'?"
      options:
        - text: "Moving all tests to the left panel of the IDE"
          correct: false
        - text: "Replacing manual testers with automated scripts"
          correct: false
        - text: "Involving testing and QA activities earlier in the development process"
          correct: true
        - text: "Running tests only on the left side of the CI pipeline"
          correct: false
      explanation: "Shift-left means catching bugs earlier — during design and development rather than after release. The 'left' refers to the left end of the development timeline. Earlier bug detection is cheaper: a bug found during code review costs far less to fix than one found in production."

    - id: Q11
      type: single_choice
      question: "A JMeter test plan shows p95 = 620ms against an SLO of p95 < 500ms. What does this mean?"
      options:
        - text: "95% of requests failed with an error"
          correct: false
        - text: "The average response time is 620ms, which is within tolerance"
          correct: false
        - text: "95% of requests completed in 620ms or less, which exceeds the 500ms SLO and means the test failed"
          correct: true
        - text: "The slowest single request took 620ms, which is acceptable"
          correct: false
      explanation: "p95 (95th percentile) means 95% of all requests completed in that time or less. 620ms > 500ms SLO, so the performance target was not met. The SLO is violated even though 95% of requests did complete — they just weren't fast enough."

    - id: Q12
      type: single_choice
      question: "OWASP ZAP is primarily used for what type of testing?"
      options:
        - text: "Unit testing of backend business logic"
          correct: false
        - text: "Security testing — finding vulnerabilities like missing headers, injection flaws, and exposed endpoints"
          correct: true
        - text: "Load testing to simulate thousands of concurrent users"
          correct: false
        - text: "Accessibility auditing for WCAG compliance"
          correct: false
      explanation: "OWASP ZAP (Zed Attack Proxy) is a security testing tool maintained by OWASP. It acts as a proxy between your browser and the app, scanning for common vulnerabilities such as missing security headers, SQL injection, XSS, and insecure configurations."
