quiz:
  title: "Part 1 Knowledge Check — Finding and Reporting Bugs"
  pass_threshold: 0.7
  questions:
    - id: Q1
      type: single_choice
      question: "A developer deploys code without running any tests. A QA engineer on the team reviews the deployment process and recommends adding automated checks at the build stage. This is an example of:"
      options:
        - text: "Quality Control"
          correct: false
        - text: "Quality Assurance"
          correct: true
        - text: "User Acceptance Testing"
          correct: false
        - text: "Exploratory Testing"
          correct: false
      explanation: "Quality Assurance is process-focused and preventive — it improves the way software is built. Quality Control is product-focused and detective — it checks the thing that was already built. Recommending a process change before problems occur is QA."

    - id: Q2
      type: single_choice
      question: "In the V-Model, when does acceptance testing planning begin?"
      options:
        - text: "After the code is written"
          correct: false
        - text: "During system testing"
          correct: false
        - text: "During requirements analysis"
          correct: true
        - text: "After deployment"
          correct: false
      explanation: "The V-Model mirrors development phases with test phases. Acceptance testing planning starts when requirements are being defined, because you need to know what the system must do before you can define how you'll verify it."

    - id: Q3
      type: single_choice
      question: "A login button stops working on the CEO's browser. The bug only affects one specific browser version used by 0.2% of your users. How should you classify it?"
      options:
        - text: "Critical severity, High priority"
          correct: false
        - text: "Low severity, Low priority"
          correct: false
        - text: "High severity, Low priority"
          correct: false
        - text: "Low severity, High priority"
          correct: true
      explanation: "Severity = technical impact. Only one browser is affected — that's Low severity. Priority = business urgency. The CEO is affected — that's High priority. Severity and priority are independent axes."

    - id: Q4
      type: single_choice
      question: "Which testing approach would a developer use when writing unit tests with full knowledge of the internal code structure?"
      options:
        - text: "Black Box"
          correct: false
        - text: "Gray Box"
          correct: false
        - text: "White Box"
          correct: true
        - text: "Exploratory"
          correct: false
      explanation: "White Box testing uses full knowledge of the code — internal paths, conditions, branches. Unit tests written by a developer who knows the code are a classic White Box activity."

    - id: Q5
      type: single_choice
      question: "Which layer of the Testing Pyramid should have the MOST tests?"
      options:
        - text: "End-to-End tests"
          correct: false
        - text: "Integration tests"
          correct: false
        - text: "Unit tests"
          correct: true
        - text: "Manual exploratory tests"
          correct: false
      explanation: "The pyramid is widest at the bottom. Unit tests are fast, cheap, and reliable — you can run thousands in seconds. E2E tests are slow and brittle. More unit tests, fewer E2E tests keeps your suite fast and trustworthy."

    - id: Q6
      type: single_choice
      question: "A bug report says: 'The checkout is broken. Please fix.' What critical information is MISSING?"
      options:
        - text: "The browser version"
          correct: false
        - text: "The severity level"
          correct: false
        - text: "Reproduction steps, expected result, and actual result"
          correct: true
        - text: "The tester's name"
          correct: false
      explanation: "A useful bug report needs: environment, steps to reproduce, expected result, and actual result. Without these four, a developer cannot reproduce the bug or know when it's fixed. 'The checkout is broken' tells us nothing actionable."

    - id: Q7
      type: single_choice
      question: "What type of test oracle are you using when you compare the output of a new feature against a requirements document?"
      options:
        - text: "Heuristic"
          correct: false
        - text: "Consistent"
          correct: false
        - text: "Specified"
          correct: true
        - text: "Derived"
          correct: false
      explanation: "A Specified oracle uses a formal document (requirements, spec, contract) to determine expected behavior. Comparing output to a requirements document is the most common form."

    - id: Q8
      type: single_choice
      question: "In an Agile team, when does testing happen?"
      options:
        - text: "Only at the end of the release"
          correct: false
        - text: "In a dedicated test phase after development"
          correct: false
        - text: "Throughout every sprint alongside development"
          correct: true
        - text: "Only when bugs are reported by users"
          correct: false
      explanation: "Agile moves testing into every sprint. QA and developers work together — tests are written alongside code, and bugs are fixed within the same sprint. Testing is not a handoff; it's a shared activity."

    - id: Q9
      type: true_false
      question: "A 'Works on my machine' response from a developer means the bug report can be closed."
      options:
        - text: "True"
          correct: false
        - text: "False"
          correct: true
      explanation: "'Works on my machine' is a data point, not a resolution. It means the bug may be environment-specific. The correct response is to compare environments and add more detail to the reproduction steps, not to close the report."

    - id: Q10
      type: single_choice
      question: "Which of the following is a Heuristic test oracle?"
      options:
        - text: "Checking that output matches the API contract"
          correct: false
        - text: "Verifying a calculation using a formula from the spec"
          correct: false
        - text: "Using your experience to judge that a 3-second page load 'feels too slow'"
          correct: true
        - text: "Comparing today's output to yesterday's passing test"
          correct: false
      explanation: "A Heuristic oracle relies on the tester's domain knowledge and experience rather than a formal document or calculated value. 'This feels too slow' is a judgment call based on expertise — that's a Heuristic oracle."
