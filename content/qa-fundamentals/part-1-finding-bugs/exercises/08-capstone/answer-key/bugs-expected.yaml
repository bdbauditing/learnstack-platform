# STAFF ONLY

bugs:
  - id: BUG-001
    description: "Submit button disabled with valid credentials"
    location: "login"
    severity: High
    priority: High
    signatureKeywords: ["button", "disabled", "login"]
    keywordThreshold: 0.6

  - id: BUG-002
    description: "Password shown as plain text"
    location: "login"
    severity: Medium
    priority: Medium
    signatureKeywords: ["password", "plain", "visible"]
    keywordThreshold: 0.5

  - id: BUG-003
    description: "Invalid email format accepted"
    location: "registration"
    severity: High
    priority: High
    signatureKeywords: ["email", "invalid", "format"]
    keywordThreshold: 0.5

  - id: BUG-004
    description: "Duplicate email returns 500 error"
    location: "registration"
    severity: High
    priority: Medium
    signatureKeywords: ["email", "duplicate", "error"]
    keywordThreshold: 0.5

  - id: BUG-005
    description: "Task created with blank title"
    location: "tasks"
    severity: High
    priority: High
    signatureKeywords: ["task", "blank", "title", "empty"]
    keywordThreshold: 0.4

  - id: BUG-006
    description: "Completed task still shows in Active Tasks"
    location: "tasks"
    severity: Medium
    priority: High
    signatureKeywords: ["task", "completed", "active", "filter"]
    keywordThreshold: 0.4

  - id: BUG-007
    description: "Seat count can be decremented to 0"
    location: "billing"
    severity: High
    priority: High
    signatureKeywords: ["seat", "zero", "minimum", "decrement"]
    keywordThreshold: 0.4

  - id: BUG-008
    description: "Promo code SAVE10 applies 100% discount"
    location: "billing"
    severity: Critical
    priority: High
    signatureKeywords: ["promo", "discount", "percent", "code"]
    keywordThreshold: 0.4

  - id: BUG-009
    description: "Bio changes not saved after Update"
    location: "profile"
    severity: Medium
    priority: Medium
    signatureKeywords: ["bio", "save", "profile", "update"]
    keywordThreshold: 0.4

  - id: BUG-010
    description: "Avatar upload accepts any file type"
    location: "profile"
    severity: High
    priority: High
    signatureKeywords: ["avatar", "upload", "file", "exe"]
    keywordThreshold: 0.4

passThreshold: 8
