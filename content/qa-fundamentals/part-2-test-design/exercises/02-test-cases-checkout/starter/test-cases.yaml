test_cases:
  - id: TC-001
    title: "Verify that checkout succeeds with valid cart, address, and card"
    preconditions:
      - "User is logged in"
      - "Cart has at least one item"
    steps:
      - action: navigate
        url: "/checkout"
      - action: type
        selector: '[data-test="card-number"]'
        value: "4111111111111111"
      - action: type
        selector: '[data-test="card-expiry"]'
        value: "12/28"
      - action: type
        selector: '[data-test="card-cvv"]'
        value: "123"
      - action: click
        selector: '[data-test="place-order"]'
    expected: "Order confirmation page is shown with order number"
    priority: High
