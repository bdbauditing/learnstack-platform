test_cases:
  - id: TC-001
    title: "Verify that selecting 3 tasks and bulk-deleting removes them from the list"
    preconditions:
      - "User is logged in as admin"
      - "At least 3 tasks exist"
    steps:
      - action: navigate
        url: "/tasks"
      - action: click
        selector: '[data-test="task-checkbox-1"]'
      - action: click
        selector: '[data-test="task-checkbox-2"]'
      - action: click
        selector: '[data-test="task-checkbox-3"]'
      - action: click
        selector: '[data-test="bulk-delete-btn"]'
      - action: click
        selector: '[data-test="confirm-delete-btn"]'
    expected: "3 tasks are removed from the task list"
    priority: High
