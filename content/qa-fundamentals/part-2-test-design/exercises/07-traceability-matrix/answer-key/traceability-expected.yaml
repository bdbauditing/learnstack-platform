# STAFF ONLY — used by traceability-match grader
#
# For each requirement, at least one of the acceptable_test_ids must be linked.
# For each defect, at least one of the acceptable_test_ids must be linked.
# This allows multiple valid answers while preventing gaming.

requirements:
  - req_id: REQ-001
    acceptable_test_ids: [TC-001]

  - req_id: REQ-002
    acceptable_test_ids: [TC-002, TC-003]

  - req_id: REQ-003
    acceptable_test_ids: [TC-004]

  - req_id: REQ-004
    acceptable_test_ids: [TC-005, TC-006]

  - req_id: REQ-005
    acceptable_test_ids: [TC-007, TC-008]

  - req_id: REQ-006
    acceptable_test_ids: [TC-009, TC-010, TC-011, TC-012]

  - req_id: REQ-007
    acceptable_test_ids: [TC-013, TC-014, TC-015]

  - req_id: REQ-008
    acceptable_test_ids: [TC-016, TC-017, TC-018]

  - req_id: REQ-009
    acceptable_test_ids: [TC-019]

  - req_id: REQ-010
    acceptable_test_ids: [TC-020, TC-021, TC-022]

  - req_id: REQ-011
    acceptable_test_ids: [TC-023, TC-024]

  - req_id: REQ-012
    acceptable_test_ids: [TC-025]

defects:
  - defect_id: DEF-001
    # Login button disabled → caught by login test
    acceptable_test_ids: [TC-001, TC-002, TC-003]

  - defect_id: DEF-002
    # Duplicate email 500 error → caught by duplicate email test
    acceptable_test_ids: [TC-005, TC-006]

  - defect_id: DEF-003
    # Cart total doesn't update → caught by cart recalculation test
    acceptable_test_ids: [TC-009, TC-010, TC-011, TC-012]

  - defect_id: DEF-004
    # Card field accepts letters → caught by card validation test
    acceptable_test_ids: [TC-013, TC-014, TC-015]

  - defect_id: DEF-005
    # Coupon 100% discount → caught by checkout test
    acceptable_test_ids: [TC-013, TC-014, TC-015, TC-016]

  - defect_id: DEF-006
    # Empty cart checkout → caught by empty cart guard test
    acceptable_test_ids: [TC-016, TC-017, TC-018]

  - defect_id: DEF-007
    # Bio doesn't save → caught by profile update test
    acceptable_test_ids: [TC-020, TC-021, TC-022]

  - defect_id: DEF-008
    # Search returns wrong category → caught by search category test
    acceptable_test_ids: [TC-023, TC-024]
