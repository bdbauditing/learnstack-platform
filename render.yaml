services:
  - type: web
    name: learnstack-platform-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # Paste your Neon (or other) Postgres connection string here after deploy.
        # See DEPLOYMENT-RENDER.md Step 0 for instructions.
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CONTENT_GITHUB_REPO
        # Set to your learnstack-platform GitHub URL, e.g.:
        # https://github.com/your-username/learnstack-platform
        sync: false

  - type: web
    name: learnstack-platform-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: API_URL
        # Set to the actual API URL after first deploy.
        # If Render appended a suffix to the name (e.g. -xyzw), update accordingly.
        value: https://learnstack-platform-api.onrender.com
