databases:
  - name: learnstack-platform-db
    databaseName: learnstack
    user: learnstack
    plan: free
    # Free tier expires after 90 days. Upgrade to Starter ($7/mo) for persistence.

services:
  - type: web
    name: learnstack-platform-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: learnstack-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  - type: web
    name: learnstack-platform-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: API_URL
        # Set to the actual API URL after first deploy.
        # If Render appended a suffix to the name (e.g. -xyzw), update accordingly.
        value: https://learnstack-platform-api.onrender.com
